# GitHub Actions — Dependency Review + Secret Protection
# Blocks PRs that introduce new vulnerable dependencies.
# Secret scanning is enabled at the repository level (Settings → Security)
# and runs automatically — no workflow step needed for secret detection.

name: "Dependency Review"

on:
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail the PR if any HIGH or CRITICAL vulnerability is introduced
          fail-on-severity: high
          # Post a comment on the PR summarising new vulnerabilities
          comment-summary-in-pr: always
